<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Memorias" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/main.png" />
  <link rel="apple-touch-icon" href="icons/main.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Mascotas Memorias</title>
</head>
<body>

  <div id="offline-banner" aria-live="polite">
    Sin conexión — las fotos de Drive no están disponibles
  </div>

  <header>
    <h1 id="site-title">Mascotas Memorias</h1>
    <p id="site-subtitle"></p>
  </header>

  <div id="tabs-container">
    <div id="tabs" role="tablist" aria-label="Mascotas"></div>
  </div>

  <main>
    <div id="loading"><div class="spinner"></div></div>
    <div id="error-msg">No se pudo cargar la información. Intenta de nuevo.</div>

    <section id="profile" style="display:none">
      <div id="avatar-wrap" aria-hidden="true"></div>
      <div id="profile-info">
        <div id="pet-name"></div>
        <div id="pet-years"></div>
        <span id="pet-badge"></span>
      </div>
    </section>

    <div id="tribute" style="display:none"></div>

    <div id="slideshow-btn-wrap">
      <button id="slideshow-btn" aria-label="Ver presentación">&#9654; Presentación</button>
    </div>

    <div id="collage" role="list" aria-label="Galería de fotos"></div>
    <p id="collage-empty">Aún no hay fotos agregadas.</p>
  </main>

  <footer>
    <span id="site-footer"></span>
  </footer>

  <!-- Slideshow -->
  <div id="slideshow" role="dialog" aria-modal="true" aria-label="Presentación de fotos">
    <div id="ss-stage">
      <img id="ss-img-a" class="ss-img" src="" alt="" referrerpolicy="no-referrer" />
      <img id="ss-img-b" class="ss-img" src="" alt="" referrerpolicy="no-referrer" />
    </div>
    <button id="ss-close" aria-label="Cerrar">&times;</button>
    <span id="ss-counter"></span>
    <div id="ss-controls">
      <button id="ss-play" aria-label="Pausar">&#9646;&#9646;</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Foto ampliada">
    <button id="lb-close" aria-label="Cerrar">&times;</button>
    <button class="lb-arrow" id="lb-prev" aria-label="Anterior">&#8249;</button>
    <img id="lb-img" src="" alt="Foto ampliada" referrerpolicy="no-referrer" />
    <button class="lb-arrow" id="lb-next" aria-label="Siguiente">&#8250;</button>
    <span id="lb-counter"></span>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
