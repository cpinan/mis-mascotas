<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Memorias" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/main.png" />
  <link rel="apple-touch-icon" href="icons/main.png" />
  <title>Mascotas Memorias</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c9a96e;
      --bg: #1a1208;
      --bg2: #221a0e;
      --card: #2b2010;
      --text: #f0e6d3;
      --muted: #9e8a72;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
      padding-left: var(--safe-l);
      padding-right: var(--safe-r);
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 32px 20px 20px;
    }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* ── Tabs ── */
    #tabs-container {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid #3a2e1a;
    }

    #tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 12px;
      gap: 4px;
    }

    #tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 12px 18px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 24px 16px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Pet profile card ── */
    #profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    #avatar-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--accent);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      flex-shrink: 0;
    }

    #avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #profile-info {
      text-align: center;
    }

    #pet-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    #pet-years {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }

    #pet-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    }

    /* ── Tribute ── */
    #tribute {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 28px;
    }

    /* ── Photo collage ── */
    #collage {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 110px;
      gap: 6px;
      margin-bottom: 28px;
    }

    .foto-celda {
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      position: relative;
    }

    /* Foto 0 → doble altura */
    .foto-celda:first-child {
      grid-row: span 2;
    }

    /* Foto 3 → doble ancho */
    .foto-celda:nth-child(4) {
      grid-column: span 2;
    }

    .foto-celda img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .foto-celda:hover img,
    .foto-celda:focus img {
      transform: scale(1.04);
    }

    /* Collage vacío */
    #collage-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 32px 0;
      display: none;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    #lightbox.open { display: flex; }

    #lb-img {
      max-width: min(92vw, 860px);
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      user-select: none;
      -webkit-user-drag: none;
    }

    #lb-close {
      position: absolute;
      top: calc(var(--safe-top) + 12px);
      right: 16px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Nav arrows — desktop only */
    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    @media (hover: hover) {
      .lb-arrow { display: flex; }
    }

    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-counter {
      position: absolute;
      bottom: calc(var(--safe-bot) + 16px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid #3a2e1a;
    }

    /* ── Loading spinner ── */
    #loading {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ── */
    #error-msg {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1 id="site-title">Mascotas Memorias</h1>
    <p id="site-subtitle"></p>
  </header>

  <div id="tabs-container">
    <div id="tabs" role="tablist" aria-label="Mascotas"></div>
  </div>

  <main>
    <div id="loading"><div class="spinner"></div></div>
    <div id="error-msg">No se pudo cargar la información. Intenta de nuevo.</div>

    <section id="profile" style="display:none">
      <div id="avatar-wrap" aria-hidden="true"></div>
      <div id="profile-info">
        <div id="pet-name"></div>
        <div id="pet-years"></div>
        <span id="pet-badge"></span>
      </div>
    </section>

    <div id="tribute" style="display:none"></div>

    <div id="collage" role="list" aria-label="Galería de fotos"></div>
    <p id="collage-empty">Aún no hay fotos agregadas.</p>
  </main>

  <footer>
    <span id="site-footer"></span>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Foto ampliada">
    <button id="lb-close" aria-label="Cerrar">&times;</button>
    <button class="lb-arrow" id="lb-prev" aria-label="Anterior">&#8249;</button>
    <img id="lb-img" src="" alt="Foto ampliada" referrerpolicy="no-referrer" />
    <button class="lb-arrow" id="lb-next" aria-label="Siguiente">&#8250;</button>
    <span id="lb-counter"></span>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const cache = {};
    let petList = [];
    let activePet = null;
    let lbPhotos = [];
    let lbIndex = 0;
    let lbTouchX = null;

    // ── Utilities ──────────────────────────────────────────────────────────

    function driveUrl(raw) {
      const m = raw.match(/\/file\/d\/([^/?]+)/);
      return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : raw;
    }

    function resolvePhoto(src, petName) {
      if (src.startsWith('http://') || src.startsWith('https://')) {
        return driveUrl(src);
      }
      return `mascotas/${petName}/imagenes/${src}`;
    }

    function renderTitle(raw) {
      return raw.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color || '#c9a96e');
    }

    // ── Data loading ───────────────────────────────────────────────────────

    async function loadJSON(url) {
      if (cache[url]) return cache[url];
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
      const data = await r.json();
      cache[url] = data;
      return data;
    }

    // ── Render helpers ─────────────────────────────────────────────────────

    function showLoading(on) {
      document.getElementById('loading').style.display = on ? 'flex' : 'none';
    }

    function showError(on) {
      document.getElementById('error-msg').style.display = on ? 'block' : 'none';
    }

    function buildTabs() {
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = '';
      petList.forEach((name) => {
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', 'false');
        btn.textContent = name;
        btn.addEventListener('click', () => switchPet(name));
        tabsEl.appendChild(btn);
      });
    }

    function updateTabs(activeName) {
      document.querySelectorAll('.tab').forEach((btn) => {
        const isActive = btn.textContent === activeName;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', String(isActive));
      });
    }

    function renderProfile(cfg, petName) {
      const profile = document.getElementById('profile');
      const avatarWrap = document.getElementById('avatar-wrap');
      const nameEl = document.getElementById('pet-name');
      const yearsEl = document.getElementById('pet-years');
      const badgeEl = document.getElementById('pet-badge');
      const tributeEl = document.getElementById('tribute');

      // Avatar
      avatarWrap.innerHTML = '';
      if (cfg.avatar) {
        const img = document.createElement('img');
        img.src = resolvePhoto(cfg.avatar, petName);
        img.alt = cfg.nombre;
        img.referrerPolicy = 'no-referrer';
        img.onerror = () => { avatarWrap.innerHTML = cfg.emoji || '🐾'; };
        avatarWrap.appendChild(img);
      } else {
        avatarWrap.textContent = cfg.emoji || '🐾';
      }

      nameEl.textContent = cfg.nombre || petName;
      yearsEl.textContent = cfg.años || '';
      badgeEl.textContent = cfg.badge || '';
      badgeEl.style.display = cfg.badge ? 'inline-block' : 'none';

      tributeEl.textContent = cfg.tributo || '';
      tributeEl.style.display = cfg.tributo ? 'block' : 'none';

      profile.style.display = 'flex';
      setAccent(cfg.color_acento);
    }

    function renderCollage(fotos, petName) {
      const collage = document.getElementById('collage');
      const empty = document.getElementById('collage-empty');
      collage.innerHTML = '';

      lbPhotos = fotos.map((src) => resolvePhoto(src, petName));

      if (!fotos.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      fotos.forEach((src, i) => {
        const resolved = lbPhotos[i];
        const cell = document.createElement('div');
        cell.className = 'foto-celda';
        cell.setAttribute('role', 'listitem');
        cell.tabIndex = 0;

        const img = document.createElement('img');
        img.src = resolved;
        img.alt = `Foto ${i + 1}`;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';

        cell.appendChild(img);
        cell.addEventListener('click', () => openLightbox(i));
        cell.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); }
        });
        collage.appendChild(cell);
      });
    }

    // ── Pet switching ──────────────────────────────────────────────────────

    async function switchPet(name) {
      if (activePet === name) return;
      activePet = name;
      updateTabs(name);
      showLoading(true);
      showError(false);
      document.getElementById('profile').style.display = 'none';
      document.getElementById('tribute').style.display = 'none';
      document.getElementById('collage').innerHTML = '';
      document.getElementById('collage-empty').style.display = 'none';

      try {
        const [cfg, imgs] = await Promise.all([
          loadJSON(`mascotas/${name}/config.json`),
          loadJSON(`mascotas/${name}/imagenes.json`),
        ]);
        renderProfile(cfg, name);
        renderCollage(imgs.fotos || [], name);
      } catch (err) {
        console.error(err);
        showError(true);
      } finally {
        showLoading(false);
      }
    }

    // ── Lightbox ───────────────────────────────────────────────────────────

    function openLightbox(index) {
      lbIndex = index;
      updateLightboxImg();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightboxImg() {
      document.getElementById('lb-img').src = lbPhotos[lbIndex];
      document.getElementById('lb-counter').textContent =
        lbPhotos.length > 1 ? `${lbIndex + 1} / ${lbPhotos.length}` : '';
    }

    function lbGo(delta) {
      lbIndex = (lbIndex + delta + lbPhotos.length) % lbPhotos.length;
      updateLightboxImg();
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => lbGo(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbGo(1));

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLightbox();
    });

    // Touch swipe for lightbox
    document.getElementById('lightbox').addEventListener('touchstart', (e) => {
      lbTouchX = e.touches[0].clientX;
    }, { passive: true });

    document.getElementById('lightbox').addEventListener('touchend', (e) => {
      if (lbTouchX === null) return;
      const dx = e.changedTouches[0].clientX - lbTouchX;
      lbTouchX = null;
      if (Math.abs(dx) > 50) lbGo(dx < 0 ? 1 : -1);
    }, { passive: true });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbGo(1);
      if (e.key === 'ArrowLeft') lbGo(-1);
    });

    // ── Init ───────────────────────────────────────────────────────────────

    async function init() {
      showLoading(true);
      try {
        const data = await loadJSON('mascotas.json');
        const sitio = data.sitio || {};
        petList = data.mascotas || [];

        // Site texts
        document.title = sitio.titulo ? sitio.titulo.replace(/\*/g, '') : 'Mascotas Memorias';
        document.getElementById('site-title').innerHTML = renderTitle(sitio.titulo || 'Mascotas Memorias');
        document.getElementById('site-subtitle').textContent = sitio.subtitulo || '';
        document.getElementById('site-footer').textContent = sitio.pie_de_pagina || '';

        buildTabs();

        if (petList.length) {
          showLoading(false);
          await switchPet(petList[0]);
        } else {
          showLoading(false);
          showError(true);
        }
      } catch (err) {
        console.error(err);
        showLoading(false);
        showError(true);
      }
    }

    // ── Service Worker ─────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    init();
  </script>
</body>
</html>
